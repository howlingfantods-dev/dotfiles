set-environment -g PATH "$PATH"
# set true color?
set -as terminal-overrides ",*:Tc"

set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_action 'copy-pipe-no-clear'
set -g @yank_with_mouse 'off'

# cycle windows
bind-key h previous-window
bind-key l next-window

# Unbind the default prefix key (Ctrl-b)
unbind C-b

# Set the new prefix to Ctrl-z
set -g prefix C-z

# Ensure you can still use Ctrl-z in applications within tmux
bind C-z send-prefix

# set vi-mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-no-clear

# Bind a new window to prefix + c
bind-key c new-window -c "#{pane_current_path}"

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Unbind Ctrl+c from the prefix
unbind-key -n C-c


##### vim-tmux-navigator (GLOBAL bindings) #####

# Unbind any existing global Ctrl-nav keys (safety)
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l

# Detect vim/neovim in pane
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?(g?(view|n?vim?x?))$'"

# Global (no-prefix) pane navigation
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Load plugins first
run '~/.tmux/plugins/tpm/tpm'

### === Transparent Tokyo Night Storm–style bar ===

# truecolor and transparent background
set -as terminal-overrides ",*:Tc"
set -g status on
set -g status-bg default
set -g status-fg "#c0caf5"
set -g status-style "bg=default,fg=#c0caf5"
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

# Refresh + layout
set -g status-interval 2
set -g status-justify left   # workspace tabs flush left

# Left side empty, right side: current path + git branch
set -g status-left-length 100
set -g status-left ""
set -g status-right-length 100
set -g status-right "#[fg=#7aa2f7]#{pane_current_path} #[fg=#bb9af7]#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null)"

# Window list styling (default layout, recolored)
set -g window-status-format " #[fg=#565f89]#I:#W "
set -g window-status-current-format " #[fg=#7aa2f7,bold,underline]#I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Message / copy mode colors
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
set -g message-command-style "bg=#1a1b26,fg=#bb9af7"
set -g mode-style "bg=#1a1b26,fg=#7dcfff,bold"

# Reload binding
bind r source-file ~/.tmux.conf \; display "󰄉  tmux config reloaded!"

if-shell "uname | grep -q Darwin" "source-file ~/.tmux.mac.conf"
if-shell "[ -f /proc/version ] && grep -qi microsoft /proc/version" "source-file ~/.tmux.wsl.conf"
if-shell "[ -f /proc/version ] && ! grep -qi microsoft /proc/version" "source-file ~/.tmux.linux.conf"
