set-environment -g PATH "$PATH"
# set true color?
set -as terminal-overrides ",*:Tc"
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# cycle windows
bind-key h previous-window
bind-key l next-window

# Unbind the default prefix key (Ctrl-b)
unbind C-b

# Set the new prefix to Ctrl-z
set -g prefix C-z

# Ensure you can still use Ctrl-z in applications within tmux
bind C-z send-prefix

# set vi-mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Bind a new window to prefix + c
bind-key c new-window -c "#{pane_current_path}"

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Unbind Ctrl+c from the prefix
unbind-key -n C-c


# Load plugins first
run '~/.tmux/plugins/tpm/tpm'

### === Transparent Tokyo Night Storm–style bar ===

# truecolor and transparent background
set -as terminal-overrides ",*:Tc"
set -g status on
set -g status-bg default
set -g status-fg "#c0caf5"
set -g status-style "bg=default,fg=#c0caf5"
set -g window-style 'bg=default'
set -g window-active-style 'bg=default'

# Refresh + layout
set -g status-interval 2
set -g status-justify left   # workspace tabs flush left

# Left segment: current path + git branch
set -g status-left-length 100

# Remove right segment entirely
set -g status-right ""

# Window list styling (default layout, recolored)
set -g window-status-format " #[fg=#565f89]#I:#W "
set -g window-status-current-format " #[fg=#7aa2f7,bold,underline]#I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Message / copy mode colors
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
set -g message-command-style "bg=#1a1b26,fg=#bb9af7"
set -g mode-style "bg=#1a1b26,fg=#7dcfff,bold"

# Reload binding
bind r source-file ~/.tmux.conf \; display "󰄉  tmux config reloaded!"
